services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-app
    restart: always
    ports:
      - "${APP_PORT:-3003}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-pos_restaurant}?schema=public
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3003}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-votre_secret_tres_long_ici}
      - PRISMA_ENABLE_DB_PUSH_FALLBACK=${PRISMA_ENABLE_DB_PUSH_FALLBACK:-true}
      - PRISMA_SEED_ON_START=${PRISMA_SEED_ON_START:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: pos-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-pos_restaurant}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pos_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pos_restaurant}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: pos-redis
    restart: always
    volumes:
      - pos_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

volumes:
  pos_db_data:
  pos_redis_data:

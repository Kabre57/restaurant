name: Generate and Validate API Documentation

on:
  push:
    branches: [ main, master, dev ]
    paths:
      - 'src/app/api/**/*.ts'
      - 'src/lib/swagger.ts'
      - 'scripts/generate-openapi.ts'
      - 'package.json'
  pull_request:
    branches: [ main, master, dev ]
    paths:
      - 'src/app/api/**/*.ts'
      - 'src/lib/swagger.ts'
      - 'scripts/generate-openapi.ts'
      - 'package.json'
  workflow_dispatch:

jobs:
  api-docs:
    name: Generate & Validate OpenAPI Spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Generate OpenAPI specification
        run: npm run generate:api

      - name: Validate OpenAPI Spec with Vitest
        run: npx vitest run tests/unit/openapi.test.ts

      - name: Upload OpenAPI JSON Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json

services:
  app-dev:
    image: node:20-alpine
    container_name: pos-app-dev
    working_dir: /app
    restart: unless-stopped
    command: sh -c "apk add --no-cache libc6-compat openssl ca-certificates && npm ci && npx prisma generate --schema ./prisma/schema && npm run dev"
    ports:
      - "3004:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - pos_node_modules:/app/node_modules
      - pos_next_dev:/app/.next
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pos-db:5432/${POSTGRES_DB:-pos_restaurant}?schema=public"
      DIRECT_DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pos-db:5432/${POSTGRES_DB:-pos_restaurant}?schema=public"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3004}
      REDIS_URL: "redis://pos-redis:6379"
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      LOCAL_HARDWARE_AGENT_URL: http://host.docker.internal:4555
      LOCAL_HARDWARE_AGENT_TOKEN: ${LOCAL_HARDWARE_AGENT_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pos_node_modules:
  pos_next_dev:

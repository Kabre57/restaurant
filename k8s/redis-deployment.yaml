apiVersion: v1
kind: Service
metadata:
  name: pos-redis
  namespace: pos-app
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app: pos-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pos-redis
  namespace: pos-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pos-redis
  template:
    metadata:
      labels:
        app: pos-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pos-app
  namespace: pos-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pos-app
  template:
    metadata:
      labels:
        app: pos-app
    spec:
      containers:
        - name: pos-app
          image: pos-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: pos-app-env
          readinessProbe:
            httpGet:
              path: "/"
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: "/"
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 600m
              memory: 1Gi
